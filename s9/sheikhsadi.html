<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Story of Sheikh Saadi - Interactive Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fdfbf7;
            font-family: 'Lato', sans-serif;
            color: #2d3436;
        }
        .bengali-font {
            font-family: 'Noto Serif Bengali', serif;
        }
        .phrase-segment {
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
            border-bottom: 2px solid transparent;
            padding: 0 2px;
            border-radius: 4px;
        }
        .phrase-segment:hover {
            background-color: #fef3c7;
            border-bottom: 2px solid #f59e0b;
        }
        .tooltip-custom {
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1f2937;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 1.25rem; /* Large font */
            font-weight: 700;
            white-space: nowrap;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .tooltip-custom::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: #1f2937 transparent transparent transparent;
        }
        .phrase-segment:active .tooltip-custom,
        .phrase-segment.active .tooltip-custom {
            opacity: 1;
        }
        .sentence-row {
            margin-bottom: 1.5rem;
            line-height: 2;
        }
        .translation-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            color: #4b5563;
        }
        .translation-drawer.open {
            max-height: 200px;
            margin-top: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed #d1d5db;
        }
        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e5e7eb;
            cursor: pointer;
            transition: background 0.2s;
            vertical-align: middle;
            margin: 0 6px;
        }
        .icon-btn:hover {
            background: #d1d5db;
        }
    </style>
</head>

        const container = document.getElementById('story-container');

        function speak(text, rate = 0.8) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = rate;
            window.speechSynthesis.speak(utterance);
        }

        function toggleTranslation(id) {
            const el = document.getElementById(`trans-${id}`);
            el.classList.toggle('open');
        }

                const sentenceDiv = document.createElement('div');

                // Language Icon (End)

                langBtn.className = 'icon-btn text-green-600';
                langBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M4.545 6.714 4.11 8H3l1.862-5h1.284L8 8H6.833l-.435-1.286H4.545zm1.634-1.217L5.432 3.32h-.058l-.744 2.177h1.549z"/><path d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2zm11.533 1.212c-1.153 0-2.053.87-2.053 2.084 0 1.287 1.058 2.236 2.302 2.236 1.122 0 1.821-.641 2.28-1.099l-.532-.551c-.404.374-.937.767-1.582.767-.856 0-1.503-.69-1.503-1.404 0-.837.62-1.395 1.503-1.395.695 0 1.139.346 1.558.677l.531-.583c-.439-.433-1.077-.732-2.003-.732z"/></svg>`;
                langBtn.onclick = () => toggleTranslation(index);

                const phraseContainer = document.createElement('span');
                
                item.phrases.forEach(p => {
                    const span = document.createElement('span');
                    span.className = 'phrase-segment relative';
                    span.innerHTML = `
                        ${p.en}
                        <span class="tooltip-custom bengali-font">${p.bn}</span>
                    `;
                    
                    span.addEventListener('click', (e) => {
                        e.stopPropagation();
                        // Remove active class from others
                        document.querySelectorAll('.phrase-segment').forEach(el => el.classList.remove('active'));
                        // Add active class to this
                        span.classList.add('active');
                        // Speak phrase
                        speak(p.en, 0.6);
                        // Auto hide tooltip after 2.5s
                        setTimeout(() => span.classList.remove('active'), 2500);
                    });

                    phraseContainer.appendChild(span);
                    phraseContainer.appendChild(document.createTextNode(' '));
                });

                const translationDiv = document.createElement('div');
                translationDiv.id = `trans-${index}`;
                translationDiv.className = 'translation-drawer bengali-font font-bold text-xl md:text-2xl';
                translationDiv.innerText = item.bengali;

                sentenceDiv.appendChild(speakerBtn);
                sentenceDiv.appendChild(phraseContainer);
                sentenceDiv.appendChild(langBtn);
                sentenceDiv.appendChild(translationDiv);

                container.appendChild(sentenceDiv);
            });
        }

        window.onload = renderStory;

        // Close tooltips when clicking outside
        document.addEventListener('click', () => {
            document.querySelectorAll('.phrase-segment').forEach(el => el.classList.remove('active'));
        });
    </script>
</body>
</html>
