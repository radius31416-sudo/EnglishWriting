        .bengali-font {

        }
        .phrase-segment {
            transition: all 0.2s ease;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            font-weight: 700; /* Increased thickness for English font */
            color: #1e293b;
        }
        /* Enhanced Highlight Effect */
        .phrase-segment:hover {
            background-color: #4f46e5; /* Deep Indigo color */
            color: #ffffff; /* White text for contrast */
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        /* Tooltip Style */
        .tooltip {
            position: absolute;
            background: #1e1b4b; /* Darker navy */
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 1.4rem;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transform: translateY(-110%);
            white-space: nowrap;
        }
        .tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #1e1b4b transparent transparent;
        }
        .sentence-container {
            margin-bottom: 2rem;
            line-height: 2.2;
        }
        .translation-box {
            display: none;
            background-color: #eff6ff;
            border-left: 6px solid #2563eb;
            padding: 1.25rem;
            margin-top: 0.75rem;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
            animation: slideDown 0.3s ease-out forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-btn {
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            margin-right: 12px;
            color: #475569;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 50%;
        }
        .icon-btn:hover {
            transform: scale(1.2);
            color: #2563eb;

        }

                phrases: [
                    { en: "As the newspapers", bn: "যেহেতু সংবাদপত্রগুলো" },
                    { en: "are owned by", bn: "মালিকানাধীন" },
                    { en: "different political parties,", bn: "বিভিন্ন রাজনৈতিক দলের," },

                bengaliSentence: "সত্যি বলতে কি, সংবাদপত্র কখনো কখনো সত্যকে গোপন করে এবং মিথ্যা ছড়ায়।",
                phrases: [
                    { en: "Really speaking,", bn: "সত্যি বলতে," },
                    { en: "newspapers sometimes", bn: "সংবাদপত্র মাঝে মাঝে" },
                    { en: "suppress the truth", bn: "সত্যকে গোপন করে" },
                    { en: "and spread lies.", bn: "এবং মিথ্যা ছড়ায়।" }

                bengaliSentence: "কাজেই, সংবাদপত্র সব সময় নিরঙ্কুশ আশীর্বাদ নয়।",
                phrases: [
                    { en: "Hence,", bn: "অতএব/কাজেই," },
                    { en: "a newspaper", bn: "একটি সংবাদপত্র" },

                ]
            },
            {
                englishSentence: "In spite of its drawbacks, newspapers are the most useful thing in modern life.",
                bengaliSentence: "ত্রুটি থাকা সত্ত্বেও আধুনিক জীবনে সংবাদপত্র সবচেয়ে দরকারী জিনিস।",
                phrases: [
                    { en: "In spite of", bn: "সত্ত্বেও" },
                    { en: "its drawbacks,", bn: "এর ত্রুটিসমূহ," },

                phrases: [

                    { en: "the frogs", bn: "ব্যাঙদের" },

                ]
            },
            {

                phrases: [
                    { en: "It is a looking glass", bn: "এটি একটি দর্পণ" },
                    { en: "of the modern world.", bn: "আধুনিক বিশ্বের।" },
                    { en: "So, all of us", bn: "তাই আমাদের সকলের" },
                    { en: "should read it regularly.", bn: "উচিত এটি নিয়মিত পড়া।" }
                ]
            }
        ];

        const contentArea = document.getElementById('story-content');
        const tooltip = document.getElementById('global-tooltip');

        function speak(text, slow = true) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = slow ? 0.65 : 0.8; // Slightly slower for better clarity
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function showTooltip(e, text) {
            tooltip.textContent = text;
            tooltip.classList.remove('hidden');
            const rect = e.target.getBoundingClientRect();
            // Positioning tooltip center above the element
            const center = rect.left + (rect.width / 2);
            tooltip.style.left = `${center - (tooltip.offsetWidth / 2)}px`;
            tooltip.style.top = `${rect.top + window.scrollY - 12}px`;
        }

        function hideTooltip() {
            tooltip.classList.add('hidden');
        }

        function toggleTranslation(id) {
            const el = document.getElementById(`trans-${id}`);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        // Build UI
        storyData.forEach((item, index) => {
            const sentenceDiv = document.createElement('div');
            sentenceDiv.className = 'sentence-container';

            // Speak Button
            const speakBtn = document.createElement('button');
            speakBtn.className = 'icon-btn';
            speakBtn.title = "বাক্যটি শুনুন";
            speakBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>`;
            speakBtn.onclick = () => speak(item.englishSentence, true);
            sentenceDiv.appendChild(speakBtn);

            // Phrase Segments
            item.phrases.forEach(phrase => {
                const span = document.createElement('span');
                span.className = 'phrase-segment';
                span.textContent = phrase.en + " ";
                
                span.onmouseover = (e) => showTooltip(e, phrase.bn);
                span.onmouseout = hideTooltip;
                span.onclick = () => speak(phrase.en, true);

                sentenceDiv.appendChild(span);
            });

            // Translation Toggle Button
            const transBtn = document.createElement('button');
            transBtn.className = 'icon-btn ml-2';
            transBtn.title = "বঙ্গানুবাদ দেখুন";
            transBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" /></svg>`;
            transBtn.onclick = () => toggleTranslation(index);
            sentenceDiv.appendChild(transBtn);

            // Translation Box
            const transBox = document.createElement('div');
            transBox.id = `trans-${index}`;
            transBox.className = 'translation-box bengali-font text-2xl md:text-3xl font-bold text-blue-900';
            transBox.textContent = item.bengaliSentence;
            sentenceDiv.appendChild(transBox);

            contentArea.appendChild(sentenceDiv);
        });
    </script>
